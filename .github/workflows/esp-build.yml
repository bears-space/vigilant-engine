name: Frontend and Firmware CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vigilant-engine-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: vigilant-engine-frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: vigilant-engine-frontend
        run: |
          npm run build:vigilant
          npm run build:recovery

      - name: Collect frontend artifacts
        run: |
          mkdir -p .ci-artifacts/frontend
          cp build/static/vigilant/vigilant.html .ci-artifacts/frontend/vigilant.html
          cp build/static/recovery/index.html .ci-artifacts/frontend/recovery.html

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: .ci-artifacts/frontend
          if-no-files-found: error

  firmware:
    runs-on: ubuntu-latest
    needs: frontend
    env:
      ESP_IDF_VERSION: v6.0
      IDF_TOOLS_PATH: /tmp/esp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: .ci-artifacts/frontend

      - name: Cache ESP-IDF
        id: cache-esp-idf
        uses: actions/cache@v4
        with:
          path: |
            /tmp/esp
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-${{ env.ESP_IDF_VERSION }}-v1

      - name: Validate cached ESP-IDF
        id: validate-esp-idf
        if: steps.cache-esp-idf.outputs.cache-hit == 'true'
        shell: bash
        run: |
          export_script="$(find /tmp/esp/idf -path '*/esp-idf/export.sh' | sort | tail -n 1)"
          if [ -z "${export_script}" ]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if . "${export_script}" >/dev/null 2>&1; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install ESP-IDF
        if: steps.cache-esp-idf.outputs.cache-hit != 'true' || steps.validate-esp-idf.outputs.ready != 'true'
        uses: espressif/install-esp-idf-action@v1
        with:
          version: ${{ env.ESP_IDF_VERSION }}

      - name: Locate ESP-IDF export script
        id: esp-idf
        shell: bash
        run: |
          export_script="$(find /tmp/esp/idf -path '*/esp-idf/export.sh' | sort | tail -n 1)"
          if [ -z "${export_script}" ]; then
            echo "ESP-IDF export.sh not found under /tmp/esp/idf" >&2
            exit 1
          fi
          echo "export_script=${export_script}" >> "${GITHUB_OUTPUT}"

      - name: Build firmware
        env:
          IDF_TARGET: esp32c6
        shell: bash
        run: |
          . "${{ steps.esp-idf.outputs.export_script }}"
          idf.py \
            -DVE_BUILD_WEB=OFF \
            -DVE_VIGILANT_HTML="${GITHUB_WORKSPACE}/.ci-artifacts/frontend/vigilant.html" \
            build
